<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Black background -->
  <rect width="32" height="32" fill="#0a0a0a"/>
  <!-- Prism triangle outline -->
  <polygon points="16,4 28,26 4,26" fill="none" stroke="#e5e5e5" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Spectrum rays emerging from right side -->
  <line x1="22" y1="15" x2="31" y2="10" stroke="#ff4d4d" stroke-width="1" opacity="0.9"/>
  <line x1="22" y1="17" x2="31" y2="13" stroke="#ff9900" stroke-width="1" opacity="0.9"/>
  <line x1="22" y1="19" x2="31" y2="17" stroke="#ffee00" stroke-width="1" opacity="0.9"/>
  <line x1="22" y1="21" x2="31" y2="21" stroke="#33cc33" stroke-width="1" opacity="0.9"/>
  <line x1="22" y1="23" x2="31" y2="25" stroke="#3399ff" stroke-width="1" opacity="0.9"/>
  <!-- White input ray -->
  <line x1="1" y1="15" x2="10" y2="18" stroke="#e5e5e5" stroke-width="1.2" opacity="0.8"/>
</svg>
